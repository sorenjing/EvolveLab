services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      # 为空则不鉴权 / 不持久化（本地开发默认）
      - AGENT_TOKEN=${AGENT_TOKEN:-}
      - REDIS_URL=${REDIS_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
    restart: unless-stopped

  frontend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
